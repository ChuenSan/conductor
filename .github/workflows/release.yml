name: Release

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Build DMGs
        run: |
          VERSION="${RELEASE_TAG#v}" Scripts/make-dmg.sh arm64 x86_64

      - name: Verify artifacts
        run: |
          hdiutil verify "dist/Conductor-${RELEASE_TAG#v}-arm64.dmg"
          hdiutil verify "dist/Conductor-${RELEASE_TAG#v}-x86_64.dmg"
          codesign --verify --deep --strict --verbose=2 dist/arm64/Conductor.app
          codesign --verify --deep --strict --verbose=2 dist/x86_64/Conductor.app
          shasum -a 256 "dist/Conductor-${RELEASE_TAG#v}-arm64.dmg" "dist/Conductor-${RELEASE_TAG#v}-x86_64.dmg" > dist/checksums.txt

      - name: Write release notes
        run: |
          {
            echo "## Highlights"
            echo
            echo "- Agent Tools — Skills, MCP and Hooks — now live in the right-hand panel; the separate management window is gone."
            echo "- Unified flat redesign across all three, each shaped to how it actually works: MCP as a server list with per-app install lights, Hooks as a lifecycle-event timeline with per-agent lights, Skills as a top-nav single column."
            echo "- New Hooks builder lets one automation target multiple lifecycle events at once."
            echo "- macOS System Settings–style grouped forms for the add / new dialogs."
            echo "- Usage tracking aligned with CodexBar; fixed the Codex provider crash and the config hot-reload loop."
            echo "- Auto-update now installs and restarts after download."
            echo
            echo "## Assets"
            echo
            echo "- Apple Silicon: \`Conductor-${RELEASE_TAG#v}-arm64.dmg\`"
            echo "- Intel: \`Conductor-${RELEASE_TAG#v}-x86_64.dmg\`"
            echo
            echo "## Checksums"
            echo
            echo "\`\`\`text"
            cat dist/checksums.txt
            echo "\`\`\`"
          } > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          assets=(
            "dist/Conductor-${VERSION}-arm64.dmg"
            "dist/Conductor-${VERSION}-x86_64.dmg"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "Conductor ${RELEASE_TAG}" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --title "Conductor ${RELEASE_TAG}" --notes-file release-notes.md
          fi
