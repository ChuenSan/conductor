<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conductor V10 Current Shell Refinement</title>
  <style>
    :root {
      --window: #dfe6ef;
      --sidebar: #eef3f9;
      --sidebar-2: #e9eff7;
      --sidebar-line: rgba(42, 54, 72, .12);
      --sidebar-line-strong: rgba(42, 54, 72, .18);
      --ink: #232b38;
      --ink-soft: #677386;
      --ink-muted: #9aa5b6;
      --blue: #1277ff;
      --violet: #7257ff;
      --violet-2: #9a8cff;
      --violet-soft: rgba(114, 87, 255, .16);
      --violet-fill: rgba(114, 87, 255, .11);
      --green: #2bb97b;
      --term: #080b10;
      --term-2: #0d121a;
      --term-3: #111823;
      --term-line: rgba(223, 232, 246, .085);
      --term-line-strong: rgba(151, 134, 255, .42);
      --term-text: #d9dee8;
      --term-muted: #747d8f;
      --term-blue: #86afff;
      --radius-window: 22px;
      --radius-shell: 18px;
      --radius-control: 12px;
      --ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
      color: var(--ink);
      font-family: var(--ui);
      letter-spacing: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, #f7f9fc 0%, #dce4ee 100%);
    }

    .window {
      width: min(2048px, calc(100vw - 18px));
      height: min(1336px, calc(100vh - 18px));
      min-height: 760px;
      overflow: hidden;
      border-radius: var(--radius-window);
      border: 1px solid rgba(25, 35, 50, .18);
      background: var(--window);
      box-shadow: 0 34px 90px rgba(13, 22, 35, .18), inset 0 1px 0 rgba(255, 255, 255, .82);
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 404px minmax(0, 1fr);
      gap: 12px;
      padding: 13px 13px 13px 14px;
      min-width: 0;
      min-height: 0;
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: 72px 310px 195px 1fr auto;
      border-radius: var(--radius-shell);
      border: 1px solid rgba(255, 255, 255, .72);
      background:
        linear-gradient(180deg, rgba(249, 252, 255, .70), rgba(231, 238, 248, .82)),
        var(--sidebar);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .80), 0 18px 34px rgba(27, 40, 58, .08);
      overflow: hidden;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(45, 58, 76, .035) 1px, transparent 1px);
      background-size: 100% 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.7), transparent 38%);
    }

    .traffic-row {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
    }

    .traffic {
      display: flex;
      gap: 10px;
    }

    .traffic i {
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .08);
    }

    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #28c840; }

    .collapse {
      margin-left: auto;
      width: 44px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: #7d8898;
      background: rgba(215, 224, 235, .66);
      font-size: 26px;
      line-height: 1;
      font-weight: 760;
    }

    .workspace-block {
      position: relative;
      z-index: 1;
      padding: 18px 24px 0;
    }

    .section-title {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--ink-muted);
      font-size: 16px;
      font-weight: 760;
    }

    .add {
      color: #697589;
      font-size: 26px;
      font-weight: 520;
    }

    .workspace-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .workspace-row {
      height: 50px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-radius: 13px;
      color: var(--ink);
      font-size: 20px;
      font-weight: 780;
    }

    .workspace-row.active {
      background:
        linear-gradient(90deg, rgba(18, 119, 255, .11), rgba(114, 87, 255, .12));
      box-shadow:
        inset 0 0 0 1px rgba(114, 87, 255, .08),
        inset 4px 0 0 var(--blue);
    }

    .grid-icon {
      width: 25px;
      height: 25px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 2px;
      color: #7c889a;
    }

    .grid-icon i {
      border: 2px solid currentColor;
      border-radius: 3px;
    }

    .active .grid-icon i {
      background: var(--blue);
      border-color: var(--blue);
    }

    .workspace-count {
      color: var(--ink-muted);
      font-size: 18px;
      font-weight: 720;
      font-family: var(--mono);
    }

    .status {
      position: relative;
      z-index: 1;
      margin: 0 24px;
      padding-top: 20px;
      border-top: 1px solid var(--sidebar-line-strong);
    }

    .status-card {
      margin-top: 12px;
      overflow: hidden;
      border-radius: 15px;
      border: 1px solid var(--sidebar-line-strong);
      background: rgba(246, 250, 255, .55);
    }

    .status-row {
      min-height: 31px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      color: var(--ink-muted);
      font-size: 16px;
      font-weight: 700;
    }

    .status-row strong {
      color: var(--ink);
      font-size: 17px;
      font-family: var(--mono);
    }

    .quick {
      position: relative;
      z-index: 1;
      margin: 0 24px;
      padding-top: 17px;
      border-top: 1px solid var(--sidebar-line-strong);
    }

    .quick-list {
      display: grid;
      gap: 20px;
      margin-top: 22px;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 12px;
      color: #738095;
      font-size: 19px;
      font-weight: 760;
    }

    .quick-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: #738095;
      font-size: 24px;
      font-weight: 560;
    }

    .sidebar-bottom {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 24px;
      padding: 0 24px 26px;
      color: #738095;
      font-size: 20px;
      font-weight: 780;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 12px;
    }

    .main {
      min-width: 0;
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: 60px 44px minmax(0, 1fr);
      border-radius: 17px;
      overflow: hidden;
      background: var(--term);
      box-shadow:
        0 0 0 1px rgba(30, 22, 87, .40),
        0 0 0 2px rgba(114, 87, 255, .34),
        inset 0 1px 0 rgba(255, 255, 255, .07);
    }

    .main::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      pointer-events: none;
      background: linear-gradient(180deg, var(--violet), transparent 58%, var(--violet-2));
      z-index: 8;
    }

    .workspace-tabs {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: stretch;
      border-bottom: 1px solid rgba(221, 230, 246, .08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.00)),
        #0d131c;
    }

    .tab-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding-left: 20px;
      overflow: hidden;
    }

    .workspace-tab {
      height: 44px;
      min-width: 204px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 30px 20px;
      align-items: center;
      gap: 8px;
      padding: 0 9px 0 12px;
      border-radius: 19px;
      border: 1px solid rgba(225, 233, 248, .07);
      color: #7f899b;
      font-size: 19px;
      font-weight: 760;
      background: rgba(255, 255, 255, .018);
    }

    .workspace-tab.active {
      color: #f0f2f8;
      border-color: rgba(114, 87, 255, .55);
      background:
        linear-gradient(180deg, rgba(114, 87, 255, .20), rgba(114, 87, 255, .08));
      box-shadow: inset 0 -2px 0 rgba(154, 140, 255, .74), 0 0 0 1px rgba(114, 87, 255, .18);
    }

    .tab-mark {
      width: 30px;
      height: 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 5px;
      border-radius: 9px;
      background: rgba(255, 255, 255, .055);
      color: #5f6878;
    }

    .tab-mark i {
      border-radius: 3px;
      background: currentColor;
      opacity: .82;
    }

    .active .tab-mark {
      color: var(--violet-2);
      background: rgba(114, 87, 255, .16);
    }

    .tab-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .tab-badge {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #8b95a6;
      background: rgba(255, 255, 255, .055);
      font-size: 16px;
      font-family: var(--mono);
      font-weight: 800;
    }

    .active .tab-badge {
      color: #d8d2ff;
      background: rgba(114, 87, 255, .24);
    }

    .tab-close {
      color: #7c8492;
      font-size: 24px;
      line-height: 1;
      text-align: center;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      padding: 0 12px;
    }

    .command {
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 11px;
      border-radius: 18px;
      border: 1px solid rgba(218, 228, 246, .075);
      color: #858fa0;
      background: rgba(255, 255, 255, .018);
      font-size: 16px;
      font-weight: 740;
      white-space: nowrap;
    }

    .command.strong {
      border-color: rgba(114, 87, 255, .14);
      color: #a5afc1;
      background: rgba(255, 255, 255, .035);
    }

    .command-icon {
      width: 21px;
      height: 21px;
      display: grid;
      place-items: center;
      color: #98a2b3;
      font-size: 20px;
      line-height: 1;
    }

    .pane-tabs {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: stretch;
      border-bottom: 1px solid rgba(221, 230, 246, .08);
      background: var(--term-2);
    }

    .terminal-tabs {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding-left: 21px;
      overflow: hidden;
    }

    .terminal-tab {
      height: 35px;
      min-width: 220px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 8px;
      padding: 0 9px;
      border-radius: 9px;
      border: 1px solid rgba(221, 230, 246, .055);
      color: #838c9c;
      background: rgba(255, 255, 255, .018);
      font-size: 18px;
      font-weight: 720;
    }

    .terminal-tab.active {
      color: #e4e7ef;
      border-color: rgba(114, 87, 255, .68);
      background:
        linear-gradient(180deg, rgba(114, 87, 255, .22), rgba(114, 87, 255, .10));
      box-shadow: inset 0 -2px 0 rgba(154, 140, 255, .74);
    }

    .terminal-tab span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .term-icon {
      width: 20px;
      height: 16px;
      display: grid;
      place-items: center;
      border: 1px solid currentColor;
      border-radius: 3px;
      color: #687385;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 800;
    }

    .active .term-icon {
      color: var(--violet-2);
    }

    .pane-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 10px;
    }

    .round-tool {
      width: 35px;
      height: 35px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(221, 230, 246, .075);
      border-radius: 13px;
      color: #7f899b;
      background: rgba(255, 255, 255, .02);
      font-size: 22px;
      font-weight: 520;
    }

    .terminal {
      min-width: 0;
      min-height: 0;
      position: relative;
      padding: 8px 0 0 0;
      background:
        linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px),
        var(--term);
      background-size: 100% 28px;
      color: var(--term-text);
      font-family: var(--mono);
      font-size: 21px;
      line-height: 1.55;
      overflow: hidden;
    }

    .terminal::before {
      content: "";
      position: absolute;
      inset: 0 0 0 auto;
      width: 3px;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(114, 87, 255, .86), transparent 55%, rgba(114, 87, 255, .86));
    }

    .terminal .time {
      position: absolute;
      top: 118px;
      right: 24px;
      color: rgba(154, 140, 255, .58);
      font-size: 22px;
      font-family: var(--mono);
    }

    .line {
      display: block;
      min-height: 32px;
      padding-left: 6px;
      white-space: pre;
    }

    .login {
      color: rgba(236, 239, 247, .86);
    }

    .home {
      color: #95d2ff;
    }

    .prompt {
      display: inline-block;
      width: 22px;
      color: var(--term-blue);
      font-weight: 900;
    }

    .cursor {
      display: inline-block;
      width: 13px;
      height: 27px;
      vertical-align: -5px;
      background: #e7ecf5;
      box-shadow: 0 0 0 1px rgba(255,255,255,.12);
    }

    .focus-score {
      position: absolute;
      left: 0;
      top: 104px;
      width: 3px;
      height: 112px;
      background: var(--violet);
      box-shadow: 0 0 18px rgba(114, 87, 255, .56);
    }

    @media (max-width: 980px) {
      .window {
        width: 100vw;
        height: 100vh;
        min-height: 0;
        border-radius: 0;
      }

      .app {
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 8px;
        padding: 8px;
      }

      .sidebar {
        grid-template-rows: 58px 170px 1fr auto;
      }

      .workspace-block,
      .status,
      .quick {
        padding-left: 10px;
        padding-right: 10px;
        margin-left: 0;
        margin-right: 0;
      }

      .section-title,
      .workspace-row .workspace-count,
      .workspace-row span,
      .status,
      .quick,
      .toolbar .command:not(.strong),
      .tab-badge,
      .tab-close {
        display: none;
      }

      .workspace-row {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 0;
      }

      .main {
        grid-template-rows: 56px 42px minmax(0, 1fr);
      }

      .workspace-tab {
        min-width: 128px;
        grid-template-columns: 30px minmax(0, 1fr);
      }

      .terminal-tab {
        min-width: 150px;
      }
    }

    @media (min-width: 981px) and (max-width: 1560px) {
      .app {
        grid-template-columns: 420px minmax(0, 1fr);
      }

      .workspace-tab {
        min-width: 190px;
      }

      .toolbar .command:nth-child(4),
      .toolbar .command:nth-child(5) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="window">
    <div class="app">
      <aside class="sidebar">
        <div class="traffic-row">
          <div class="traffic" aria-hidden="true">
            <i class="red"></i>
            <i class="yellow"></i>
            <i class="green"></i>
          </div>
          <div class="collapse">‹</div>
        </div>

        <section class="workspace-block">
          <div class="section-title">
            <span>工作区</span>
            <span class="add">+</span>
          </div>
          <div class="workspace-list">
            <div class="workspace-row">
              <div class="grid-icon"><i></i><i></i><i></i><i></i></div>
              <span>工作区 2</span>
              <div class="workspace-count">1</div>
            </div>
            <div class="workspace-row active">
              <div class="grid-icon"><i></i><i></i><i></i><i></i></div>
              <span>工作区 3</span>
              <div class="workspace-count">2</div>
            </div>
          </div>
        </section>

        <section class="status">
          <div class="section-title">状态</div>
          <div class="status-card">
            <div class="status-row"><span>分屏</span><strong>1</strong></div>
            <div class="status-row"><span>终端</span><strong>2</strong></div>
            <div class="status-row"><span>通知</span><strong>0</strong></div>
            <div class="status-row"><span>当前</span><strong>zsh 2</strong></div>
          </div>
        </section>

        <section class="quick">
          <div class="section-title">快捷操作</div>
          <div class="quick-list">
            <div class="quick-row"><div class="quick-icon">⊞</div><span>新开终端</span></div>
            <div class="quick-row"><div class="quick-icon">＋</div><span>新标签</span></div>
            <div class="quick-row"><div class="quick-icon">▯</div><span>向右分屏</span></div>
            <div class="quick-row"><div class="quick-icon">▭</div><span>向下分屏</span></div>
            <div class="quick-row"><div class="quick-icon">⌘</div><span>命令面板</span></div>
            <div class="quick-row"><div class="quick-icon">▦</div><span>工作区总览</span></div>
            <div class="quick-row"><div class="quick-icon">♧</div><span>通知 0</span></div>
            <div class="quick-row"><div class="quick-icon">A|</div><span>重命名工作区</span></div>
            <div class="quick-row"><div class="quick-icon">◇</div><span>重命名标签</span></div>
          </div>
        </section>

        <div></div>

        <div class="sidebar-bottom">
          <div class="bottom-row"><span>◌</span><span>Codex Dark</span></div>
          <div class="bottom-row"><span>⚙</span><span>设置</span></div>
        </div>
      </aside>

      <section class="main">
        <header class="workspace-tabs">
          <div class="tab-strip">
            <div class="workspace-tab">
              <div class="tab-mark"><i></i><i></i><i></i><i></i></div>
              <div class="tab-title">工作区 2</div>
              <div class="tab-badge">1</div>
              <div class="tab-close">×</div>
            </div>
            <div class="workspace-tab active">
              <div class="tab-mark"><i></i><i></i><i></i><i></i></div>
              <div class="tab-title">工作区 3</div>
              <div class="tab-badge">2</div>
              <div class="tab-close">×</div>
            </div>
          </div>

          <div class="toolbar">
            <div class="command"><span class="command-icon">＋</span>工作区</div>
            <div class="command"><span class="command-icon">⊞</span>新终端</div>
            <div class="command"><span class="command-icon">＋</span>新标签</div>
            <div class="command"><span class="command-icon">▯</span>右分屏</div>
            <div class="command"><span class="command-icon">▭</span>下分屏</div>
            <div class="command strong"><span class="command-icon">▦</span></div>
            <div class="command strong"><span class="command-icon">♧</span></div>
            <div class="command strong">… 命令</div>
          </div>
        </header>

        <div class="pane-tabs">
          <div class="terminal-tabs">
            <div class="terminal-tab">
              <div class="term-icon">~</div>
              <span>zsh</span>
              <span>×</span>
            </div>
            <div class="terminal-tab active">
              <div class="term-icon">~</div>
              <span>zsh 2</span>
              <span>×</span>
            </div>
          </div>
          <div class="pane-tools">
            <div class="round-tool">＋</div>
            <div class="round-tool">×</div>
          </div>
        </div>

        <div class="terminal">
          <div class="focus-score"></div>
          <span class="line login">Last login: Sun May 17 22:23:28 on ttys003</span>
          <span class="line"></span>
          <span class="line home">~</span>
          <span class="line"><span class="prompt">›</span><span class="cursor"></span></span>
          <div class="time">22:23</div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
