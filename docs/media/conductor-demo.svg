<svg width="1440" height="810" viewBox="0 0 1440 810" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="810" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E8EEF5"/>
    </linearGradient>
    <filter id="shadow" x="242" y="74" width="956" height="668" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="38" flood-color="#40566B" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1440" height="810" rx="30" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="286" y="110" width="868" height="596" rx="26" fill="#FFFFFF" stroke="#DCE4EC"/>
  </g>
  <rect x="310" y="134" width="820" height="52" rx="16" fill="#F6F8FA" stroke="#E1E7EE"/>
  <text x="336" y="167" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800" fill="#252B33">Conductor 发布前工作流</text>
  <g id="step1">
    <rect x="336" y="226" width="768" height="104" rx="18" fill="#F8FAFC" stroke="#DDE6EF"/>
    <circle cx="386" cy="278" r="24" fill="#E8F1FC"/>
    <text x="386" y="286" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900" fill="#4F8FE7">1</text>
    <text x="432" y="270" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#27303A">工作区</text>
    <text x="432" y="298" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#7A8592">终端、网页、文件和命令在同一个原生窗口内流转。</text>
    <animate attributeName="opacity" values="1;1;0.38;0.38;1" dur="8s" repeatCount="indefinite"/>
  </g>
  <g id="step2" opacity="0.38">
    <rect x="336" y="358" width="768" height="104" rx="18" fill="#F8FAFC" stroke="#DDE6EF"/>
    <circle cx="386" cy="410" r="24" fill="#EEF7EF"/>
    <text x="386" y="418" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900" fill="#34A853">2</text>
    <text x="432" y="402" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#27303A">用量与健康</text>
    <text x="432" y="430" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#7A8592">本地记录、服务状态和清理建议进入同一个可操作面板。</text>
    <animate attributeName="opacity" values="0.38;1;1;0.38;0.38" dur="8s" repeatCount="indefinite"/>
  </g>
  <g id="step3" opacity="0.38">
    <rect x="336" y="490" width="768" height="104" rx="18" fill="#F8FAFC" stroke="#DDE6EF"/>
    <circle cx="386" cy="542" r="24" fill="#FFF3E1"/>
    <text x="386" y="550" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="900" fill="#D89036">3</text>
    <text x="432" y="534" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#27303A">GitHub Release 更新</text>
    <text x="432" y="562" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#7A8592">发布新 release 后，App 自动读取 latest manifest、下载并替换运行时。</text>
    <animate attributeName="opacity" values="0.38;0.38;1;1;0.38" dur="8s" repeatCount="indefinite"/>
  </g>
  <rect x="632" y="630" width="176" height="38" rx="19" fill="#1E242C"/>
  <circle cx="666" cy="649" r="6" fill="#34C759">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="684" y="654" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="800" fill="#F6F8FA">Demo Loop</text>
</svg>
